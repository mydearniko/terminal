name: Build Windows Terminal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025-vs2026
    env:
      BUILD_PLATFORM: x64
      BUILD_CONFIGURATION: Release
      VCPKG_BASELINE: 927f62e4b8838bd7e441e9c45103a16ffd75007e

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ── Caches ─────────────────────────────────────────────
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: packages
          key: nuget-${{ hashFiles('dep/nuget/packages.config', 'build/packages.config', 'src/common.nugetversions.props') }}
          restore-keys: nuget-

      - name: Cache vcpkg
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: |
            dep/vcpkg
            obj/x64/vcpkg
          key: vcpkg-${{ env.VCPKG_BASELINE }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-${{ env.VCPKG_BASELINE }}-

      - name: Cache compiled objects
        uses: actions/cache@v4
        with:
          path: obj
          key: obj-${{ env.BUILD_PLATFORM }}-${{ env.BUILD_CONFIGURATION }}-${{ github.sha }}
          restore-keys: |
            obj-${{ env.BUILD_PLATFORM }}-${{ env.BUILD_CONFIGURATION }}-

      # ── Setup ──────────────────────────────────────────────
      - name: Add nuget.org package source
        run: nuget sources add -Name "nuget.org" -Source "https://api.nuget.org/v3/index.json" -ConfigFile NuGet.config

      - name: Bootstrap vcpkg
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          if (Test-Path "dep\vcpkg") { Remove-Item -Recurse -Force "dep\vcpkg" }
          git clone https://github.com/microsoft/vcpkg dep/vcpkg
          cd dep/vcpkg
          git checkout $env:VCPKG_BASELINE
          ./bootstrap-vcpkg.bat
          cd ../..
          echo "VCPKG_ROOT=$(Resolve-Path dep/vcpkg)" >> $env:GITHUB_ENV

      - name: Set vcpkg root (cache hit)
        if: steps.vcpkg-cache.outputs.cache-hit == 'true'
        run: |
          if (-not (Test-Path "dep\vcpkg\vcpkg.exe")) {
            cd dep/vcpkg
            ./bootstrap-vcpkg.bat
            cd ../..
          }
          echo "VCPKG_ROOT=$(Resolve-Path dep/vcpkg)" >> $env:GITHUB_ENV

      - name: Generate NOTICE.html
        run: |
          powershell -ExecutionPolicy Bypass -File ./build/scripts/Generate-ThirdPartyNotices.ps1 -MarkdownNoticePath ./NOTICE.md -OutputPath ./src/cascadia/CascadiaPackage/NOTICE.html

      - name: Create self-signed certificate for MSIX
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=Microsoft Corporation, O=Microsoft Corporation, L=Redmond, S=Washington, C=US" `
            -KeyUsage DigitalSignature `
            -FriendlyName "WT Dev Signing" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          $pw = ConvertTo-SecureString -String "BuildCert123!" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath src/cascadia/CascadiaPackage/CascadiaPackage_TemporaryKey.pfx -Password $pw
          echo "SIGNING_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Set VCToolsVersion
        run: |
          $VSInstances = ([xml](& 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -include packages -format xml))
          $VSPackages = $VSInstances.instances.instance.packages.package
          $LatestVCPackage = ($VSPackages | ? { $_.id -eq "Microsoft.VisualCpp.Tools.Core" })
          $LatestVCToolsVersion = $LatestVCPackage.version

          $VSRoot = (& 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property 'resolvedInstallationPath')
          $VCToolsRoot = Join-Path $VSRoot "VC\Tools\MSVC"
          $PackageVCToolPath = Join-Path $VCToolsRoot $LatestVCToolsVersion
          If ($Null -Eq (Get-Item $PackageVCToolPath -ErrorAction:Ignore)) {
            $VCToolsVersions = Get-ChildItem $VCToolsRoot | ForEach-Object { [Version]$_.Name } | Sort -Descending
            $LatestActualVCToolsVersion = $VCToolsVersions | Select -First 1
            If ([Version]$LatestVCToolsVersion -Ne $LatestActualVCToolsVersion) {
              Write-Output "VC Tools Mismatch: Directory = $LatestActualVCToolsVersion, Package = $LatestVCToolsVersion"
              $LatestVCToolsVersion = $LatestActualVCToolsVersion.ToString(3)
            }
          }
          Write-Output "Latest VCToolsVersion: $LatestVCToolsVersion"
          echo "VCToolsVersion=$LatestVCToolsVersion" >> $env:GITHUB_ENV

      # ── NuGet Restore ──────────────────────────────────────
      - name: Restore NuGet packages (build tools)
        continue-on-error: true
        run: nuget restore build/packages.config -ConfigFile NuGet.config -PackagesDirectory packages

      - name: Restore NuGet packages (solution)
        run: >-
          msbuild OpenConsole.slnx
          /t:Restore
          /p:Platform=${{ env.BUILD_PLATFORM }}
          /p:Configuration=${{ env.BUILD_CONFIGURATION }}
          /m

      - name: Restore NuGet packages (global)
        run: nuget restore dep/nuget/packages.config -ConfigFile NuGet.config -PackagesDirectory packages

      - name: Stamp Dev package version
        run: |
          $version = "0.0.${{ github.run_number }}.${{ github.run_attempt }}"
          $manifestPath = "src\cascadia\CascadiaPackage\Package-Dev.appxmanifest"
          $resolvedManifestPath = (Resolve-Path -LiteralPath $manifestPath).Path
          [xml]$manifest = Get-Content -LiteralPath $resolvedManifestPath -Raw
          $manifest.Package.Identity.Version = $version
          $manifest.Save($resolvedManifestPath)

          [xml]$verification = Get-Content -LiteralPath $resolvedManifestPath -Raw
          if ($verification.Package.Identity.Version -ne $version) {
            throw "Failed to stamp package version $version."
          }
          echo "PACKAGE_VERSION=$version" >> $env:GITHUB_ENV
          Write-Output "Building Windows Terminal (Dev) package version $version"

      # ── Build ──────────────────────────────────────────────
      - name: Build Terminal
        run: >-
          msbuild OpenConsole.slnx
          /p:Configuration=${{ env.BUILD_CONFIGURATION }}
          /p:Platform=${{ env.BUILD_PLATFORM }}
          /p:WindowsTerminalOfficialBuild=true
          /p:WindowsTerminalBranding=Dev
          /p:PGOBuildMode=None
          /p:PackageCertificatePassword=BuildCert123!
          /t:Terminal\CascadiaPackage
          /m
          /bl:msbuild.binlog

      - name: Prepare one-click installer
        run: |
          $appPkgs = "src\cascadia\CascadiaPackage\AppPackages"
          $msixFiles = @(Get-ChildItem -Path $appPkgs -Filter "*.msix" -Recurse)
          if ($msixFiles.Count -ne 1) {
            throw "Expected exactly one MSIX in $appPkgs, found $($msixFiles.Count)."
          }

          $msix = $msixFiles[0]
          $packageDir = $msix.Directory.FullName
          $certificateFiles = @(Get-ChildItem -LiteralPath $packageDir -Filter "*.cer" -File)
          if ($certificateFiles.Count -ne 1) {
            throw "Expected exactly one signing certificate beside the MSIX, found $($certificateFiles.Count)."
          }

          $installerDir = Join-Path $PWD "installer"
          Remove-Item -LiteralPath $installerDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path $installerDir | Out-Null
          Copy-Item -LiteralPath $msix.FullName -Destination $installerDir
          Copy-Item -LiteralPath $certificateFiles[0].FullName -Destination $installerDir

          $dependencySource = Join-Path $packageDir "Dependencies\x64"
          if (Test-Path -LiteralPath $dependencySource) {
            $dependencyDestination = Join-Path $installerDir "Dependencies\x64"
            New-Item -ItemType Directory -Path $dependencyDestination -Force | Out-Null
            Copy-Item -Path "$dependencySource\*" -Destination $dependencyDestination -Recurse
          }

          $installScript = @'
          [CmdletBinding()]
          param()

          $ErrorActionPreference = 'Stop'

          try {
              $identity = [Security.Principal.WindowsIdentity]::GetCurrent()
              $principal = New-Object Security.Principal.WindowsPrincipal($identity)
              $isAdministrator = $principal.IsInRole([Security.Principal.WindowsBuiltInRole]::Administrator)

              if (-not $isAdministrator) {
                  Write-Host 'Administrator approval is required to trust the signing certificate.'
                  $powershell = "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe"
                  $arguments = "-NoProfile -ExecutionPolicy Bypass -File `"$PSCommandPath`""
                  $process = Start-Process -FilePath $powershell -Verb RunAs -ArgumentList $arguments -Wait -PassThru
                  exit $process.ExitCode
              }

              $packages = @(Get-ChildItem -LiteralPath $PSScriptRoot -File | Where-Object { $_.Extension -eq '.msix' })
              $certificates = @(Get-ChildItem -LiteralPath $PSScriptRoot -File | Where-Object { $_.Extension -eq '.cer' })
              if ($packages.Count -ne 1) {
                  throw "Expected exactly one MSIX beside this installer, found $($packages.Count)."
              }
              if ($certificates.Count -ne 1) {
                  throw "Expected exactly one certificate beside this installer, found $($certificates.Count)."
              }

              $versionMatch = [regex]::Match($packages[0].BaseName, '_(\d+\.\d+\.\d+\.\d+)_')
              if (-not $versionMatch.Success) {
                  throw "Could not determine the package version from $($packages[0].Name)."
              }
              $packageVersion = [version]$versionMatch.Groups[1].Value
              $installedPackage = Get-AppxPackage -Name 'WindowsTerminalDev' -ErrorAction SilentlyContinue |
                  Sort-Object Version -Descending |
                  Select-Object -First 1
              if ($null -ne $installedPackage -and [version]$installedPackage.Version -eq $packageVersion) {
                  Write-Host "Windows Terminal (Dev) $packageVersion is already installed." -ForegroundColor Green
                  exit 0
              }

              $certificate = Get-PfxCertificate -FilePath $certificates[0].FullName
              $trustedCertificate = "Cert:\LocalMachine\TrustedPeople\$($certificate.Thumbprint)"
              if (-not (Test-Path -LiteralPath $trustedCertificate)) {
                  Write-Host 'Trusting this build signing certificate...'
                  Import-Certificate -FilePath $certificates[0].FullName -CertStoreLocation 'Cert:\LocalMachine\TrustedPeople' | Out-Null
              } else {
                  Write-Host 'Signing certificate is already trusted.'
              }

              $dependencyDir = Join-Path $PSScriptRoot 'Dependencies\x64'
              $dependencies = @()
              if (Test-Path -LiteralPath $dependencyDir) {
                  $dependencies = @(
                      Get-ChildItem -LiteralPath $dependencyDir -File |
                          Where-Object { $_.Extension -in '.appx', '.msix', '.appxbundle', '.msixbundle' } |
                          ForEach-Object { $_.FullName }
                  )
              }

              Write-Host 'Installing Windows Terminal (Dev)...'
              $parameters = @{
                  Path = $packages[0].FullName
                  ForceApplicationShutdown = $true
                  ForceUpdateFromAnyVersion = $true
              }
              if ($dependencies.Count -gt 0) {
                  $parameters.DependencyPath = [string[]]$dependencies
              }
              Add-AppxPackage @parameters

              Write-Host ''
              Write-Host 'Windows Terminal (Dev) installed successfully.' -ForegroundColor Green
              exit 0
          } catch {
              Write-Host ''
              Write-Host 'Installation failed:' -ForegroundColor Red
              Write-Host $_.Exception.Message -ForegroundColor Red
              exit 1
          }
          '@

          $launcher = @'
          @echo off
          setlocal
          cd /d "%~dp0"
          title Install Windows Terminal (Dev)
          echo Installing Windows Terminal (Dev)...
          echo Windows will ask for administrator approval.
          echo.
          "%SystemRoot%\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -ExecutionPolicy Bypass -File "%~dp0Install.ps1"
          set "INSTALL_EXIT_CODE=%ERRORLEVEL%"
          echo.
          if not "%INSTALL_EXIT_CODE%"=="0" echo Installation failed. See the error above.
          pause
          exit /b %INSTALL_EXIT_CODE%
          '@

          $readme = @'
          Windows Terminal (Dev) - country flag emoji build

          1. Install a supported emoji font, such as Twemoji Mozilla.
          2. Double-click Install.cmd.
          3. Approve the Windows administrator prompt.

          The installer trusts only this build's public signing certificate in the
          Local Machine Trusted People store, installs the required x64 dependency,
          and then installs or updates Windows Terminal (Dev).
          '@

          Set-Content -LiteralPath (Join-Path $installerDir "Install.ps1") -Value $installScript -Encoding ascii
          Set-Content -LiteralPath (Join-Path $installerDir "Install.cmd") -Value $launcher -Encoding ascii
          Set-Content -LiteralPath (Join-Path $installerDir "README-FIRST.txt") -Value $readme -Encoding ascii

          Write-Output "Prepared installer from $($msix.FullName):"
          Get-ChildItem -LiteralPath $installerDir -Recurse | ForEach-Object { Write-Output $_.FullName }

      - name: Upload MSIX Installer
        uses: actions/upload-artifact@v4
        with:
          name: WindowsTerminal-Installer-${{ env.BUILD_PLATFORM }}
          path: installer/
          if-no-files-found: error
          compression-level: 0

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: msbuild.binlog
